name: Build BichoApp POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        run: yes | sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true

      - name: Reescrever AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.CAMERA" />

              <application
                  android:allowBackup="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="false"
                  android:theme="@style/Theme.AppCompat.NoActionBar"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".ConfigActivity"
                      android:label="Configurações"
                      android:exported="false"
                      android:screenOrientation="portrait" />

              </application>

          </manifest>
          XMLEOF
          python3 -c "
          with open('app/src/main/AndroidManifest.xml','rb') as f: d=f.read()
          d=d.lstrip()
          with open('app/src/main/AndroidManifest.xml','wb') as f: f.write(d)
          print('Manifest primeiros bytes:', d[:30])
          "

      - name: Corrigir XMLs corrompidos
        run: |
          python3 - << 'PYEOF'
          import os

          files = [
            'app/src/main/AndroidManifest.xml',
            'app/src/main/res/layout/activity_config.xml'
          ]
          for path in files:
            with open(path, 'rb') as f:
              data = f.read()
            # Remove BOM UTF-8
            if data.startswith(b'\xef\xbb\xbf'):
              data = data[3:]
            # Remove qualquer byte antes de '<'
            idx = data.find(b'<')
            if idx > 0:
              print(f"AVISO: {path} tinha {idx} byte(s) antes do '<' — removendo")
              data = data[idx:]
            with open(path, 'wb') as f:
              f.write(data)
            print(f"OK: {path} — primeiros bytes: {data[:20]}")
          PYEOF

      - name: Garantir JitPack no settings.gradle
        run: |
          if ! grep -q "jitpack.io" settings.gradle; then
            sed -i "s|mavenCentral()|mavenCentral()\n        maven { url 'https://jitpack.io' }|" settings.gradle
          fi
          cat settings.gradle

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Build APK
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: OperaNet
          path: app/build/outputs/apk/release/app-release.apk
