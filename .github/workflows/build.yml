name: Build BichoApp POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Permissão gradlew
        run: chmod +x gradlew

      - name: Garantir JitPack no settings.gradle
        run: |
          if ! grep -q "jitpack.io" settings.gradle; then
            sed -i "s|mavenCentral()|mavenCentral()\n        maven { url 'https://jitpack.io' }|" settings.gradle
          fi
          echo "=== settings.gradle atual ==="
          cat settings.gradle

      - name: Build APK Release
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BichoAppPOS-v${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Informações do APK
        run: |
          echo "✅ APK gerado com sucesso!"
          ls -lh app/build/outputs/apk/release/
