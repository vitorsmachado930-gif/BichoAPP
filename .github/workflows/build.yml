name: Build BichoApp POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        run: |
          yes | sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true

      - name: Instalar Gradle 7.5
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.5'

      - name: Build APK
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: BichoAppPOS
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
