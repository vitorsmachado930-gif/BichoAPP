name: Build BichoApp POS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Android SDK
        run: yes | sdkmanager "platforms;android-33" "build-tools;33.0.2" --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true

      - name: Remover BOM dos arquivos XML
        run: |
          find app/src/main -name "*.xml" -exec sed -i '1s/^\xEF\xBB\xBF//' {} \;
          # Verifica se AndroidManifest.xml começa com <?xml
          head -c 5 app/src/main/AndroidManifest.xml | xxd
          head -c 5 app/src/main/res/layout/activity_config.xml | xxd

      - name: Garantir JitPack no settings.gradle
        run: |
          if ! grep -q "jitpack.io" settings.gradle; then
            sed -i "s|mavenCentral()|mavenCentral()\n        maven { url 'https://jitpack.io' }|" settings.gradle
          fi
          cat settings.gradle

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.5'

      - name: Build APK
        run: gradle assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: OperaNet
          path: app/build/outputs/apk/release/app-release.apk
