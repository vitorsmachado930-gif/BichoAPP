plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bichoapp.pos'
    compileSdk 33

    defaultConfig {
        applicationId "com.bichoapp.pos"
        minSdk 21
        targetSdk 33
        versionCode 3
        versionName "1.1.0"
    }

    buildTypes {
        debug {
            applicationIdSuffix ""
            debuggable true
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug  // usa debug key para facilitar instalação
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    // Biblioteca ESC/POS para impressora térmica Bluetooth (mesma do app anterior)
    implementation 'com.github.DantSu:ESCPOS-ThermalPrinter-Android:3.3.0'
}
